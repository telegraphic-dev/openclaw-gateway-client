<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Gateway Inspector</title>
  <style>
    :root {
      color-scheme: dark;
      --bg:#0b1020;
      --panel:#121933;
      --muted:#8ea0c7;
      --text:#ecf2ff;
      --accent:#6ea8fe;
      --border:#243055;
      --good:#2fbf71;
      --warn:#ffb020;
      --bad:#ff6b6b;
      --chip:#182347;
      --input:#0d1430;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,sans-serif;background:var(--bg);color:var(--text)}
    .app{display:grid;grid-template-columns:420px 1fr;min-height:100vh}
    .sidebar,.main{padding:16px}
    .sidebar{border-right:1px solid var(--border);background:#0f1530;overflow:auto}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px}
    .panel h2{margin:0 0 12px;font-size:16px}
    .muted{color:var(--muted)}
    label{display:block;font-size:12px;color:var(--muted);margin:10px 0 6px}
    input,textarea,select,button{width:100%;border-radius:10px;border:1px solid var(--border);background:var(--input);color:var(--text);padding:10px 12px;font:inherit}
    textarea{min-height:120px;resize:vertical}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .actions button{width:auto}
    .btn{cursor:pointer}
    .btn.primary{background:var(--accent);color:#081120;border-color:transparent;font-weight:600}
    .btn.ghost{background:transparent}
    .btn.good{background:var(--good);color:#07150d;border-color:transparent}
    .btn.warn{background:var(--warn);color:#1b1200;border-color:transparent}
    .tabs{display:flex;gap:8px;margin-bottom:12px}
    .tab{padding:8px 12px;border:1px solid var(--border);border-radius:999px;cursor:pointer}
    .tab.active{background:var(--accent);color:#081120;border-color:transparent}
    .log{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;white-space:pre-wrap;word-break:break-word;background:#0a1128;border:1px solid var(--border);border-radius:10px;padding:10px;max-height:70vh;overflow:auto}
    .list{display:flex;flex-direction:column;gap:10px}
    .entry{border:1px solid var(--border);border-radius:10px;padding:10px;background:#0d1430}
    .entry .meta{font-size:12px;color:var(--muted);margin-bottom:6px}
    .ok{color:var(--good)}
    .err{color:var(--bad)}
    .checkbox-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:8px}
    .checkbox-item{display:flex;align-items:flex-start;gap:10px;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--input)}
    .checkbox-item input{width:auto;margin-top:2px}
    .checkbox-item strong{display:block;font-size:13px}
    .checkbox-item span{display:block;font-size:12px;color:var(--muted)}
    .method-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
    .pill{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid var(--border);font-size:12px;background:var(--chip)}
    .form-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px}
    .field{border:1px solid var(--border);border-radius:10px;padding:12px;background:var(--input)}
    .field-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
    .field-name{font-weight:600}
    .required{color:var(--warn);font-size:12px}
    .field-help{font-size:12px;color:var(--muted);margin-bottom:8px}
    .field-inline{display:flex;align-items:center;gap:10px}
    .field-inline input[type="checkbox"]{width:auto}
    .hidden{display:none}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .small{font-size:12px;color:var(--muted)}
    @media (max-width: 1100px){.app{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--border)}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="panel">
        <h2>Connection</h2>
        <label>Gateway URL</label>
        <input id="url" placeholder="ws://127.0.0.1:18789" />
        <label>Gateway Token</label>
        <input id="token" placeholder="optional shared token" />
        <label>Role</label>
        <select id="role"></select>
        <label>Scopes</label>
        <div id="scopeCheckboxes" class="checkbox-grid"></div>
        <div class="small" id="scopeHint">Scopes are sent exactly as checked.</div>
        <label>Scopes Override (JSON array, optional)</label>
        <input id="scopesRaw" placeholder='["operator.read"]' />
        <label>Client ID</label>
        <input id="clientId" value="gateway-client" />
        <div class="actions" style="margin-top:12px">
          <button id="connectBtn" class="btn primary">Connect</button>
          <button id="disconnectBtn" class="btn ghost">Disconnect</button>
        </div>
        <div id="status" class="muted" style="margin-top:10px">Disconnected</div>
      </div>

      <div class="panel">
        <h2>Invoke Method</h2>
        <label>Method</label>
        <div class="row">
          <select id="method"></select>
          <input id="customMethod" placeholder="custom.method.name" />
        </div>
        <div id="methodMeta" class="method-meta"></div>
        <div id="methodDescription" class="small" style="margin-top:10px"></div>
        <div id="schemaForm" class="form-grid"></div>
        <label>Params (JSON)</label>
        <textarea id="params">{}</textarea>
        <div class="actions" style="margin-top:12px">
          <button id="resetBtn" class="btn ghost">Reset Form</button>
          <button id="callBtn" class="btn good">Call</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="tabs">
        <div class="tab active" data-tab="responses">Responses</div>
        <div class="tab" data-tab="events">Events</div>
        <div class="tab" data-tab="traffic">Traffic</div>
      </div>
      <section id="responses" class="tab-panel">
        <div id="responsesList" class="list"></div>
      </section>
      <section id="events" class="tab-panel" hidden>
        <div id="eventsList" class="list"></div>
      </section>
      <section id="traffic" class="tab-panel" hidden>
        <div id="trafficLog" class="log"></div>
      </section>
    </main>
  </div>

  <script>

    const $ = (id) => document.getElementById(id);
    const state = {
      ws: null,
      connected: false,
      selectedMethod: null,
      suppressParamsUpdate: false,
      activeSchema: null,
      selectedOneOfVariants: new Map(),
    };

    const statusEl = $('status');
    const responsesList = $('responsesList');
    const eventsList = $('eventsList');
    const trafficLog = $('trafficLog');
    const roleSelect = $('role');
    const scopeCheckboxes = $('scopeCheckboxes');
    const methodSelect = $('method');
    const schemaForm = $('schemaForm');
    const paramsEl = $('params');
    const methodMeta = $('methodMeta');
    const methodDescription = $('methodDescription');
    const customMethodEl = $('customMethod');

    function setStatus(text, kind='') {
      statusEl.textContent = text;
      statusEl.className = kind ? kind : 'muted';
    }

    function addEntry(container, title, payload, meta = '') {
      const div = document.createElement('div');
      div.className = 'entry';
      div.innerHTML = `<div class="meta">${meta}</div><div style="font-weight:600;margin-bottom:8px">${escapeHtml(title)}</div><div class="log">${escapeHtml(JSON.stringify(payload, null, 2))}</div>`;
      container.prepend(div);
    }

    function appendTraffic(label, payload) {
      trafficLog.textContent = `[${new Date().toISOString()}] ${label}\n${JSON.stringify(payload, null, 2)}\n\n` + trafficLog.textContent;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    }

    function deepClone(value) {
      return value == null ? value : JSON.parse(JSON.stringify(value));
    }

    function humanize(name) {
      return name.replace(/([a-z])([A-Z])/g, '$1 $2').replace(/[._-]/g, ' ').replace(/\b\w/g, (c) => c.toUpperCase());
    }

    function setByPath(target, path, value) {
      if (!path.length) return value;
      const [head, ...rest] = path;
      const base = target && typeof target === 'object' ? target : typeof head === 'number' ? [] : {};
      const clone = Array.isArray(base) ? [...base] : { ...base };
      clone[head] = setByPath(clone[head], rest, value);
      return clone;
    }

    function getByPath(target, path) {
      return path.reduce((acc, key) => (acc && typeof acc === 'object' ? acc[key] : undefined), target);
    }

    function deleteByPath(target, path) {
      if (!path.length) return target;
      const [head, ...rest] = path;
      if (target == null || typeof target !== 'object') return target;
      if (!rest.length) {
        if (Array.isArray(target)) {
          const clone = [...target];
          clone.splice(head, 1);
          return clone;
        }
        const clone = { ...target };
        delete clone[head];
        return clone;
      }
      if (!(head in target)) return target;
      const nextValue = deleteByPath(target[head], rest);
      const clone = Array.isArray(target) ? [...target] : { ...target };
      if (nextValue === undefined && !Array.isArray(clone)) delete clone[head];
      else clone[head] = nextValue;
      return clone;
    }

    function normalizeInteger(value) {
      if (value === '' || value == null) return undefined;
      const parsed = Number.parseInt(value, 10);
      return Number.isNaN(parsed) ? undefined : parsed;
    }

    function normalizeNumber(value) {
      if (value === '' || value == null) return undefined;
      const parsed = Number(value);
      return Number.isNaN(parsed) ? undefined : parsed;
    }

    function createRoleOptions() {
      Object.keys(ROLE_SCOPE_MAP).forEach((role) => {
        const option = document.createElement('option');
        option.value = role;
        option.textContent = role;
        roleSelect.appendChild(option);
      });
    }

    function renderScopeCheckboxes(selectedRole, selectedScopes, useRoleDefaults = false) {
      scopeCheckboxes.innerHTML = '';
      const roleDefault = new Set(ROLE_SCOPE_MAP[selectedRole] || []);
      Object.keys(SCOPE_LABELS).forEach((scope) => {
        const wrapper = document.createElement('label');
        wrapper.className = 'checkbox-item';
        const checked = selectedScopes.includes(scope) || (useRoleDefaults && roleDefault.has(scope));
        wrapper.innerHTML = `
          <input type="checkbox" value="${scope}" ${checked ? 'checked' : ''} />
          <div>
            <strong>${escapeHtml(scope)}</strong>
            <span>${escapeHtml(SCOPE_LABELS[scope])}</span>
          </div>
        `;
        scopeCheckboxes.appendChild(wrapper);
      });
    }

    function getSelectedScopes() {
      return [...scopeCheckboxes.querySelectorAll('input[type="checkbox"]:checked')].map((el) => el.value);
    }

    function updateScopesForRole(role, preserveManual = false) {
      const current = preserveManual ? getSelectedScopes() : [];
      renderScopeCheckboxes(role, current, !preserveManual && current.length === 0);
      persistConnectionFields();
    }

    function createMethodOptions() {
      const methods = Object.keys(METHOD_DEFS).sort();
      methods.forEach((method) => {
        const option = document.createElement('option');
        option.value = method;
        option.textContent = method;
        methodSelect.appendChild(option);
      });
      const custom = document.createElement('option');
      custom.value = '__custom__';
      custom.textContent = 'Custom method…';
      methodSelect.appendChild(custom);
    }

    function getDefaultParams(method) {
      const def = METHOD_DEFS[method];
      if (!def) return {};
      return deepClone(def.example ?? {});
    }

    function renderMethodMeta(method) {
      methodMeta.innerHTML = '';
      const def = METHOD_DEFS[method];
      if (!def) {
        const customPill = document.createElement('span');
        customPill.className = 'pill';
        customPill.textContent = 'custom method';
        methodMeta.appendChild(customPill);
        const jsonOnlyPill = document.createElement('span');
        jsonOnlyPill.className = 'pill';
        jsonOnlyPill.textContent = 'json only';
        methodMeta.appendChild(jsonOnlyPill);
        methodDescription.textContent = 'Any gateway method not listed in the catalog can still be invoked here with raw JSON params.';
        return;
      }
      const scopePill = document.createElement('span');
      scopePill.className = 'pill';
      scopePill.textContent = `scope: ${def.scope ?? 'unknown'}`;
      methodMeta.appendChild(scopePill);
      const formPill = document.createElement('span');
      formPill.className = 'pill';
      formPill.textContent = def.schema ? 'schema form' : 'json only';
      methodMeta.appendChild(formPill);
      methodDescription.textContent = def.description || '';
    }

    function syncParamsTextarea(next) {
      state.suppressParamsUpdate = true;
      paramsEl.value = JSON.stringify(next ?? {}, null, 2);
      state.suppressParamsUpdate = false;
    }

    function readParamsTextarea() {
      try {
        return JSON.parse(paramsEl.value || '{}');
      } catch {
        return null;
      }
    }

    function createInputForSchema({ schema, value, path, required, label }) {
      const container = document.createElement('div');
      container.className = 'field';
      const header = document.createElement('div');
      header.className = 'field-header';
      header.innerHTML = `<span class="field-name">${escapeHtml(label)}</span>${required ? '<span class="required">required</span>' : ''}<span class="pill">${escapeHtml(schema.type || (schema.enum ? 'enum' : schema.oneOf ? 'oneOf' : 'value'))}</span>`;
      container.appendChild(header);
      if (schema.description) {
        const help = document.createElement('div');
        help.className = 'field-help';
        help.textContent = schema.description;
        container.appendChild(help);
      }

      const emit = (nextValue) => {
        let params = readParamsTextarea();
        if (params == null || typeof params !== 'object') params = {};
        if (nextValue === undefined && !required) params = deleteByPath(params, path);
        else params = setByPath(params, path, nextValue);
        syncParamsTextarea(params);
      };

      if (schema.enum) {
        const select = document.createElement('select');
        const empty = document.createElement('option');
        empty.value = '';
        empty.textContent = required ? 'Select…' : '— optional —';
        select.appendChild(empty);
        schema.enum.forEach((optionValue, index) => {
          const option = document.createElement('option');
          option.value = String(index);
          option.textContent = String(optionValue);
          if (value === optionValue) option.selected = true;
          select.appendChild(option);
        });
        select.onchange = () => {
          if (select.value === '') return emit(undefined);
          emit(schema.enum[Number(select.value)]);
        };
        container.appendChild(select);
        return container;
      }

      if (schema.oneOf) {
        const variants = schema.oneOf;
        const variantKey = path.join('.');
        const inferVariantIndex = () => {
          if (state.selectedOneOfVariants.has(variantKey)) return state.selectedOneOfVariants.get(variantKey);
          if (value && typeof value === 'object' && !Array.isArray(value)) {
            const score = variants.map((variant) => {
              const keys = Object.keys(variant.properties || {});
              return keys.filter((key) => key in value).length;
            });
            const bestScore = Math.max(...score, 0);
            return bestScore > 0 ? score.indexOf(bestScore) : 0;
          }
          return 0;
        };
        const variantSelect = document.createElement('select');
        variants.forEach((variant, index) => {
          const option = document.createElement('option');
          option.value = String(index);
          option.textContent = variant.title || `Variant ${index + 1}`;
          variantSelect.appendChild(option);
        });
        variantSelect.value = String(inferVariantIndex());
        const variantMount = document.createElement('div');
        variantMount.style.marginTop = '10px';

        const getVariantDefaults = (variant) => {
          const props = variant.properties || {};
          const next = {};
          Object.keys(props).forEach((key) => {
            if (props[key].default !== undefined) next[key] = deepClone(props[key].default);
          });
          return next;
        };

        const renderVariant = () => {
          variantMount.innerHTML = '';
          const variantIndex = Number(variantSelect.value || 0);
          state.selectedOneOfVariants.set(variantKey, variantIndex);
          const variant = variants[variantIndex] || variants[0];
          const props = variant.properties || {};
          const currentRoot = readParamsTextarea();
          const currentSubtree = path.length ? getByPath(currentRoot, path) : currentRoot;
          const currentObject = currentSubtree && typeof currentSubtree === 'object' && !Array.isArray(currentSubtree) ? currentSubtree : getVariantDefaults(variant);
          if (!Object.keys(props).length) {
            const empty = document.createElement('div');
            empty.className = 'small';
            empty.textContent = 'No params required for this variant.';
            variantMount.appendChild(empty);
            return;
          }
          const group = document.createElement('div');
          group.className = 'form-grid';
          const requiredSet = new Set(variant.required || []);
          Object.keys(props).forEach((key) => {
            group.appendChild(createInputForSchema({
              schema: props[key],
              value: currentObject[key],
              path: [...path, key],
              required: requiredSet.has(key),
              label: props[key].title || humanize(key),
            }));
          });
          variantMount.appendChild(group);
        };

        variantSelect.onchange = () => {
          const variantIndex = Number(variantSelect.value || 0);
          state.selectedOneOfVariants.set(variantKey, variantIndex);
          const variant = variants[variantIndex] || variants[0];
          const nextSubtree = getVariantDefaults(variant);
          const currentRoot = readParamsTextarea();
          const nextRoot = path.length
            ? setByPath(currentRoot && typeof currentRoot === 'object' ? currentRoot : {}, path, nextSubtree)
            : nextSubtree;
          syncParamsTextarea(nextRoot);
          renderVariant();
        };
        container.appendChild(variantSelect);
        container.appendChild(variantMount);
        renderVariant();
        return container;
      }

      if (schema.type === 'boolean') {
        const wrapper = document.createElement('label');
        wrapper.className = 'field-inline';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = Boolean(value);
        checkbox.onchange = () => emit(checkbox.checked);
        wrapper.appendChild(checkbox);
        const text = document.createElement('span');
        text.textContent = label;
        wrapper.appendChild(text);
        container.appendChild(wrapper);
        return container;
      }

      if (schema.type === 'integer' || schema.type === 'number') {
        const input = document.createElement('input');
        input.type = 'number';
        input.value = value ?? '';
        input.placeholder = schema.type;
        input.oninput = () => emit(schema.type === 'integer' ? normalizeInteger(input.value) : normalizeNumber(input.value));
        container.appendChild(input);
        return container;
      }

      if (schema.type === 'array') {
        const itemsSchema = schema.items || { type: 'string' };
        const list = document.createElement('div');
        list.className = 'form-grid';
        const values = Array.isArray(value) ? value : [];
        values.forEach((itemValue, index) => {
          const itemWrap = document.createElement('div');
          itemWrap.className = 'field';
          const itemHeader = document.createElement('div');
          itemHeader.className = 'field-header';
          itemHeader.innerHTML = `<span class="field-name">Item ${index + 1}</span>`;
          itemWrap.appendChild(itemHeader);
          itemWrap.appendChild(createInputForSchema({
            schema: itemsSchema,
            value: itemValue,
            path: [...path, index],
            required: true,
            label: `${label} item`,
          }));
          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.className = 'btn ghost';
          removeBtn.textContent = 'Remove item';
          removeBtn.onclick = () => {
            const current = readParamsTextarea();
            const currentArray = getByPath(current, path);
            if (!Array.isArray(currentArray)) return;
            const nextArray = currentArray.filter((_, i) => i !== index);
            const nextRoot = setByPath(current && typeof current === 'object' ? current : {}, path, nextArray);
            syncParamsTextarea(nextRoot);
            renderSchemaForm(getActiveMethodName(), nextRoot);
          };
          itemWrap.appendChild(removeBtn);
          list.appendChild(itemWrap);
        });
        if (!values.length) {
          const empty = document.createElement('div');
          empty.className = 'small';
          empty.textContent = 'No items.';
          list.appendChild(empty);
        }
        const addBtn = document.createElement('button');
        addBtn.type = 'button';
        addBtn.className = 'btn ghost';
        addBtn.textContent = 'Add item';
        addBtn.onclick = () => {
          const current = readParamsTextarea();
          const currentArray = getByPath(current, path);
          const nextArray = Array.isArray(currentArray) ? [...currentArray] : [];
          const defaultItem = itemsSchema.default !== undefined
            ? itemsSchema.default
            : itemsSchema.type === 'object'
              ? {}
              : itemsSchema.type === 'boolean'
                ? false
                : itemsSchema.type === 'integer' || itemsSchema.type === 'number'
                  ? 0
                  : itemsSchema.type === 'array'
                    ? []
                    : '';
          nextArray.push(defaultItem);
          const nextRoot = setByPath(current && typeof current === 'object' ? current : {}, path, nextArray);
          syncParamsTextarea(nextRoot);
          renderSchemaForm(getActiveMethodName(), nextRoot);
        };
        container.appendChild(list);
        container.appendChild(addBtn);
        return container;
      }

      if (schema.type === 'object' || schema.properties) {
        const group = document.createElement('div');
        group.className = 'form-grid';
        const properties = schema.properties || {};
        const requiredSet = new Set(schema.required || []);
        const currentObject = value && typeof value === 'object' && !Array.isArray(value) ? value : {};
        const keys = Object.keys(properties);
        if (!keys.length) {
          const empty = document.createElement('div');
          empty.className = 'small';
          empty.textContent = 'No params required.';
          group.appendChild(empty);
        }
        keys.forEach((key) => {
          group.appendChild(createInputForSchema({
            schema: properties[key],
            value: currentObject[key],
            path: [...path, key],
            required: requiredSet.has(key),
            label: properties[key].title || humanize(key),
          }));
        });
        container.appendChild(group);
        return container;
      }

      const multiline = schema.format === 'textarea' || /message|text|json/i.test(label);
      const input = document.createElement(multiline ? 'textarea' : 'input');
      if (!multiline) input.type = 'text';
      input.value = value ?? '';
      input.placeholder = schema.type || 'string';
      input.oninput = () => emit(input.value === '' ? undefined : input.value);
      container.appendChild(input);
      return container;
    }

    function getActiveMethodName() {
      return methodSelect.value === '__custom__' ? customMethodEl.value.trim() : methodSelect.value.trim();
    }

    function renderSchemaForm(method, params) {
      schemaForm.innerHTML = '';
      const def = METHOD_DEFS[method];
      state.activeSchema = def?.schema || null;
      if (!def?.schema) {
        const empty = document.createElement('div');
        empty.className = 'small';
        empty.textContent = 'No schema-driven form for this method. Use raw JSON params below.';
        schemaForm.appendChild(empty);
        return;
      }
      schemaForm.appendChild(createInputForSchema({
        schema: def.schema,
        value: params,
        path: [],
        required: true,
        label: humanize(method),
      }));
    }

    function selectMethod(method, options = {}) {
      const isKnown = Boolean(METHOD_DEFS[method]);
      const effectiveMethod = isKnown ? method : (method || 'health');
      state.selectedMethod = effectiveMethod;
      methodSelect.value = isKnown ? effectiveMethod : '__custom__';
      customMethodEl.value = isKnown ? '' : effectiveMethod;
      let nextParams;
      if (options.keepCurrent) {
        const currentParams = readParamsTextarea();
        nextParams = currentParams == null ? null : currentParams;
      } else {
        nextParams = getDefaultParams(effectiveMethod);
      }
      if (nextParams != null) syncParamsTextarea(nextParams);
      renderMethodMeta(effectiveMethod);
      renderSchemaForm(effectiveMethod, nextParams ?? readParamsTextarea() ?? {});
      localStorage.setItem('ogw.method', effectiveMethod);
    }

    function persistConnectionFields() {
      localStorage.setItem('ogw.url', $('url').value);
      localStorage.setItem('ogw.token', $('token').value);
      localStorage.setItem('ogw.role', roleSelect.value);
      localStorage.setItem('ogw.clientId', $('clientId').value);
      localStorage.setItem('ogw.scopes', JSON.stringify(getSelectedScopes()));
      localStorage.setItem('ogw.scopesRaw', $('scopesRaw').value);
    }

    function connect() {
      if (state.ws) state.ws.close();
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/ws`);
      state.ws = ws;
      ws.onopen = () => {
        appendTraffic('proxy-open', { ok: true });
        const scopesRaw = localStorage.getItem('ogw.scopesRaw');
        let scopes = getSelectedScopes();
        if (scopesRaw && scopesRaw.trim()) {
          try {
            const parsed = JSON.parse(scopesRaw);
            if (!Array.isArray(parsed) || !parsed.every((v) => typeof v === 'string')) {
              throw new Error('Scopes override must be a JSON array of strings.');
            }
            scopes = parsed;
          } catch (error) {
            setStatus(error.message || 'Invalid scopes JSON override', 'err');
            ws.close();
            return;
          }
        }
        const payload = {
          type: 'connect',
          payload: {
            url: $('url').value,
            token: $('token').value || undefined,
            role: roleSelect.value || 'operator',
            scopes,
            client: { id: $('clientId').value || 'gateway-client', version: '0.1.0', platform: 'node', mode: 'backend' },
          },
        };
        appendTraffic('out', payload);
        ws.send(JSON.stringify(payload));
      };
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        appendTraffic('in', msg);
        if (msg.type === 'connected') {
          state.connected = true;
          setStatus(`Connected to ${msg.payload?.url ?? 'gateway'}`, 'ok');
        } else if (msg.type === 'disconnected') {
          state.connected = false;
          setStatus('Disconnected', 'muted');
        } else if (msg.type === 'result') {
          addEntry(responsesList, msg.payload.method, msg.payload.result, `${msg.payload.ok ? 'OK' : 'ERROR'} · ${new Date().toLocaleTimeString()}`);
        } else if (msg.type === 'event') {
          addEntry(eventsList, msg.payload.event, msg.payload.payload, new Date().toLocaleTimeString());
        } else if (msg.type === 'error') {
          addEntry(responsesList, 'error', msg.payload, `ERROR · ${new Date().toLocaleTimeString()}`);
          setStatus(msg.payload.message || 'Error', 'err');
        }
      };
      ws.onclose = () => {
        state.connected = false;
        setStatus('Disconnected', 'muted');
      };
    }

    $('connectBtn').onclick = connect;
    $('disconnectBtn').onclick = () => state.ws?.close();
    $('callBtn').onclick = () => {
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return setStatus('Connect first', 'err');
      let params;
      try {
        params = JSON.parse(paramsEl.value || '{}');
      } catch (e) {
        return setStatus('Invalid JSON params', 'err');
      }
      const selectedMethod = methodSelect.value === '__custom__' ? customMethodEl.value.trim() : methodSelect.value.trim();
      if (!selectedMethod) return setStatus('Pick or enter a method first', 'err');
      const payload = { type: 'call', payload: { method: selectedMethod, params } };
      appendTraffic('out', payload);
      state.ws.send(JSON.stringify(payload));
    };

    $('resetBtn').onclick = () => {
      selectMethod(getActiveMethodName());
    };

    methodSelect.onchange = () => {
      if (methodSelect.value === '__custom__') {
        selectMethod(customMethodEl.value.trim(), { keepCurrent: true });
        return;
      }
      selectMethod(methodSelect.value);
    };

    customMethodEl.addEventListener('input', () => {
      if (methodSelect.value !== '__custom__') return;
      const method = customMethodEl.value.trim();
      state.selectedMethod = method || 'health';
      renderMethodMeta(state.selectedMethod);
      renderSchemaForm(state.selectedMethod, readParamsTextarea() ?? {});
      localStorage.setItem('ogw.method', state.selectedMethod);
    });
    paramsEl.addEventListener('input', () => {
      if (state.suppressParamsUpdate) return;
      const parsed = readParamsTextarea();
      if (parsed == null) return;
      renderSchemaForm(getActiveMethodName(), parsed);
    });

    roleSelect.onchange = () => updateScopesForRole(roleSelect.value);
    scopeCheckboxes.addEventListener('change', persistConnectionFields);
    ['url', 'token', 'clientId', 'scopesRaw'].forEach((id) => $(id).addEventListener('input', persistConnectionFields));

    document.querySelectorAll('.tab').forEach((tab) => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach((t) => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach((p) => p.hidden = true);
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).hidden = false;
      };
    });

    function init() {
      createRoleOptions();
      createMethodOptions();
      $('url').value = localStorage.getItem('ogw.url') || 'ws://127.0.0.1:18789';
      $('token').value = localStorage.getItem('ogw.token') || '';
      $('clientId').value = localStorage.getItem('ogw.clientId') || 'gateway-client';
      $('scopesRaw').value = localStorage.getItem('ogw.scopesRaw') || '';
      roleSelect.value = localStorage.getItem('ogw.role') || 'operator';
      let storedScopes = [];
      let hasStoredScopes = false;
      try {
        const rawStoredScopes = localStorage.getItem('ogw.scopes');
        hasStoredScopes = rawStoredScopes != null;
        storedScopes = JSON.parse(rawStoredScopes || '[]');
      } catch {}
      renderScopeCheckboxes(roleSelect.value, storedScopes, !hasStoredScopes);
      selectMethod(localStorage.getItem('ogw.method') || 'health');
    }

    init();
  </script>
</body>
</html>
